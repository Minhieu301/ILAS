# Application name
spring.application.name=ilas_db

# Load local environment variables from .env when present (supports multiple run directories)
spring.config.import=optional:file:.env[.properties],optional:file:../.env[.properties],optional:file:../../.env[.properties]

# Database connection
spring.datasource.url=${DB_URL:jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:ilas_db}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:halo20231}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Optional: Format SQL log cho dễ nhìn
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
JWT_SECRET=your-super-secret-key-change-this-in-production-environment-with-minimum-256-bits
JWT_EXPIRATION=86400000

groq.api.key=${GROQ_API_KEY:}
gemini.api.key=${GEMINI_API_KEY:}
 
# ===== Crawler (Python) =====
crawler.python.executable=python
crawler.python.workdir=../python
crawler.python.module=crawler.run_crawl_api
crawler.python.timeoutSeconds=600

server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true


